<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAEA - Celestial Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --void:       #050308;
            --deep:       #0a0614;
            --indigo:     #160d38;
            --violet:     #261560;
            --rose-gold:  #eab8a8;
            --gold:       #d8b080;
            --silver:     #d0dff0;
            --lavender:   #c0aee8;
            --mist:       rgba(190,165,235,0.06);
            --glass:      rgba(8,5,18,0.55);
            --glass-edge: rgba(200,170,240,0.12);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Josefin Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            background: var(--void);
            color: var(--silver);
            cursor: crosshair;
        }

        /* Nebula canvas behind Three.js */
        #nebula-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 90% 70% at 15% 25%, rgba(55,25,120,0.65) 0%, transparent 60%),
                radial-gradient(ellipse 70% 55% at 85% 65%, rgba(110,25,90,0.45) 0%, transparent 55%),
                radial-gradient(ellipse 55% 45% at 55% 5%,  rgba(18,35,100,0.55) 0%, transparent 50%),
                radial-gradient(ellipse 60% 60% at 5%  85%, rgba(10,8,35,0.9)   0%, transparent 65%),
                radial-gradient(ellipse 40% 35% at 70% 20%, rgba(80,20,110,0.3) 0%, transparent 50%),
                linear-gradient(168deg, #0b0615 0%, #060409 45%, #080510 100%);
        }

        /* Animated soft nebula wisps */
        #nebula-bg::before {
            content: '';
            position: absolute;
            inset: -20%;
            background:
                radial-gradient(ellipse 50% 30% at 30% 60%, rgba(100,50,180,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 25% at 70% 35%, rgba(180,60,120,0.09) 0%, transparent 55%);
            animation: nebulaFloat 28s ease-in-out infinite alternate;
        }

        #nebula-bg::after {
            content: '';
            position: absolute;
            inset: -15%;
            background:
                radial-gradient(ellipse 45% 28% at 60% 70%, rgba(60,30,140,0.10) 0%, transparent 55%),
                radial-gradient(ellipse 35% 22% at 20% 40%, rgba(140,40,100,0.08) 0%, transparent 50%);
            animation: nebulaFloat 38s ease-in-out infinite alternate-reverse;
            mix-blend-mode: screen;
        }

        @keyframes nebulaFloat {
            0%   { transform: translate(0,    0)    scale(1);    opacity: 0.7; }
            33%  { transform: translate(3%,  -2%)   scale(1.04); opacity: 1;   }
            66%  { transform: translate(-2%,  3%)   scale(0.97); opacity: 0.85;}
            100% { transform: translate(2%,   1%)   scale(1.02); opacity: 1;   }
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void);
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .loading-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.6em;
            color: var(--rose-gold);
            text-shadow: 0 0 40px rgba(234,184,168,0.45), 0 0 80px rgba(180,120,220,0.2);
            margin-bottom: 1.2rem;
        }

        .loading-sub {
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.45em;
            color: var(--lavender);
            opacity: 0.5;
            margin-bottom: 2.2rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .spinner {
            animation: spin 3s linear infinite;
            border-radius: 50%;
            border: 1px solid rgba(180,160,220,0.15);
            border-top-color: var(--rose-gold);
            border-right-color: rgba(212,165,116,0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .mask-fade-edges {
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
        }

        /* Glass panel style */
        .glass {
            background: var(--glass);
            border: 1px solid var(--glass-edge);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Range input */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: rgba(180,160,220,0.12);
            height: 2px;
            border-radius: 1px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--rose-gold);
            margin-top: -6px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(232,180,160,0.5);
        }

        /* Title glow */
        .title-glow {
            text-shadow:
                0 0 30px rgba(234,184,168,0.4),
                0 0 80px rgba(180,130,220,0.2),
                0 0 140px rgba(140,90,200,0.08);
        }

        /* Smooth button transitions */
        button { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        /* Subtle mist on panels */
        .panel-mist {
            box-shadow:
                0 0 0 1px rgba(200,170,240,0.08),
                0 8px 40px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }
    </style>
</head>

        // Map a star's spectral feel to a color — driven by magnitude (brightness)
        // Brightest stars (low magnitude) get a warm white or blue-white core
        // Dimmer stars shift toward lavender, gold, or rose
        function starColor(magnitude, seed) {
            // Simple deterministic pseudo-random from seed
            const r1 = Math.abs(Math.sin(seed * 127.1 + 311.7));
            const r2 = Math.abs(Math.sin(seed * 269.5 + 183.3));

            if (magnitude <= 1.0) {
                // Brilliant — pure blue-white or ice blue
                return r1 < 0.5
                    ? new THREE.Color(0.90, 0.95, 1.00)   // blue-white
                    : new THREE.Color(0.78, 0.88, 1.00);  // ice blue
            } else if (magnitude <= 2.0) {
                // Bright — warm white with a hint of gold or violet
                if (r1 < 0.33)      return new THREE.Color(1.00, 0.97, 0.90);  // warm white
                else if (r1 < 0.66) return new THREE.Color(0.85, 0.90, 1.00);  // cool white
                else                return new THREE.Color(1.00, 0.92, 0.78);  // golden-white
            } else if (magnitude <= 3.0) {
                // Medium — lavender, soft gold, pale rose
                if (r2 < 0.33)      return new THREE.Color(0.80, 0.72, 1.00);  // lavender
                else if (r2 < 0.66) return new THREE.Color(1.00, 0.85, 0.65);  // golden
                else                return new THREE.Color(0.95, 0.78, 0.85);  // rose
            } else {
                // Faint — muted lavender or dusty rose
                return r1 < 0.5
                    ? new THREE.Color(0.68, 0.60, 0.90)   // dim lavender
                    : new THREE.Color(0.85, 0.70, 0.78);  // dim rose
            }
        }

        // Scale based on magnitude: brighter = larger sprite
        function starScale(magnitude, isFirst) {
            if (isFirst) return Math.max(18, 28 - magnitude * 3);
            const base = Math.max(10, 22 - magnitude * 3);
            return base;
        }

        // Constellation line color: soft rose-gold
        const LINE_COLOR = 0xd4a090;

        // Star sprite: bright core → warm blush → violet halo → diffraction cross
        function makeStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const cx = 128, cy = 128;

            // Outer halo — wide violet mist
            const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, 128);
            halo.addColorStop(0.00, 'rgba(255,255,255,0)');
            halo.addColorStop(0.25, 'rgba(180,140,230,0.04)');
            halo.addColorStop(0.55, 'rgba(120,80,200,0.08)');
            halo.addColorStop(0.80, 'rgba(80,40,160,0.05)');
            halo.addColorStop(1.00, 'rgba(0,0,0,0)');
            ctx.fillStyle = halo; ctx.fillRect(0, 0, 256, 256);

            // Mid glow — warm rose-gold
            const mid = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
            mid.addColorStop(0.00, 'rgba(255,255,255,0)');
            mid.addColorStop(0.10, 'rgba(255,230,210,0.5)');
            mid.addColorStop(0.35, 'rgba(220,170,200,0.25)');
            mid.addColorStop(0.65, 'rgba(160,110,220,0.10)');
            mid.addColorStop(1.00, 'rgba(0,0,0,0)');
            ctx.fillStyle = mid; ctx.fillRect(0, 0, 256, 256);

            // Core — pure white
            const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
            core.addColorStop(0.00, 'rgba(255,255,255,1.0)');
            core.addColorStop(0.30, 'rgba(255,248,235,0.95)');
            core.addColorStop(0.70, 'rgba(240,220,255,0.5)');
            core.addColorStop(1.00, 'rgba(0,0,0,0)');
            ctx.fillStyle = core; ctx.fillRect(0, 0, 256, 256);

            // Subtle diffraction spike — horizontal
            ctx.save();
            const spike = ctx.createLinearGradient(0, cy, 256, cy);
            spike.addColorStop(0.00, 'rgba(255,255,255,0)');
            spike.addColorStop(0.35, 'rgba(255,240,255,0.04)');
            spike.addColorStop(0.50, 'rgba(255,255,255,0.18)');
            spike.addColorStop(0.65, 'rgba(255,240,255,0.04)');
            spike.addColorStop(1.00, 'rgba(255,255,255,0)');
            ctx.fillStyle = spike;
            ctx.fillRect(0, cy - 2, 256, 4);
            ctx.restore();

            // Subtle diffraction spike — vertical
            ctx.save();
            const spikeV = ctx.createLinearGradient(cx, 0, cx, 256);
            spikeV.addColorStop(0.00, 'rgba(255,255,255,0)');
            spikeV.addColorStop(0.35, 'rgba(255,240,255,0.04)');
            spikeV.addColorStop(0.50, 'rgba(255,255,255,0.14)');
            spikeV.addColorStop(0.65, 'rgba(255,240,255,0.04)');
            spikeV.addColorStop(1.00, 'rgba(255,255,255,0)');
            ctx.fillStyle = spikeV;
            ctx.fillRect(cx - 2, 0, 4, 256);
            ctx.restore();

            return new THREE.CanvasTexture(canvas);
        }

              // Use star name + idx as a stable seed so colors are consistent per star
              const seed = idx + (starData ? starData.name.charCodeAt(0) * 0.01 : 0);
              const col   = starColor(mag, seed);

              const material = new THREE.SpriteMaterial({

                color: col,
                blending: THREE.AdditiveBlending,

            const controls = new OrbitControls(camera, renderer.domElement);

                const intersects = raycaster.intersectObjects(activeStars);
                if (intersects.length > 0) {
                  const obj = intersects[0].object;
                  if (obj.userData.starIndex !== undefined) setHoveredStar(obj.userData.starIndex);

            window.addEventListener('mousemove', onMouseMove);

            const animate = () => {
              requestAnimationFrame(animate);
              const time = Date.now() * 0.001;

                  const phase = child.userData.twinklePhase || 0;
                  const freq  = child.userData.twinkleFreq  || 1.2;
                  const amp   = child.userData.twinkleAmp   || 0.08;
                  const base  = child.userData.baseScale    || 14;

                  // Layered twinkle: primary wave + subtle high-freq shimmer
                  const t1 = Math.sin(time * freq        + phase);
                  const t2 = Math.sin(time * freq * 2.3  + phase * 1.7) * 0.35;
                  const tw = t1 + t2;

                  const scaleMod   = 1 + tw * amp;
                  const opacityMod = tw * amp * 0.5; // opacity shimmers alongside scale

                  child.scale.set(base * scaleMod, base * scaleMod, 1);

                  // Only modulate opacity once fully faded in
                  if (!child.userData.fadingIn) {
                    const target = child.userData.targetOpacity || 1;
                    child.material.opacity = Math.max(0.2, target + opacityMod);
                  }
                });
              }

              const fadeSpeed = 0.014;

                    if (mat.opacity <= 0) group.remove(child);
                  } else if (child.userData.fadingIn) {
                    const target = child.userData.targetOpacity || 1;
                    mat.opacity = Math.min(mat.opacity + fadeSpeed, target);
                    if (mat.opacity >= target) child.userData.fadingIn = false;

                  e('div', { style: { padding: '18px', borderRadius: '16px', background: 'rgba(180,160,220,0.05)', border: '1px solid rgba(180,160,220,0.1)' } },
                    e('p', { style: { fontSize: '8px', letterSpacing: '0.25em', textTransform: 'uppercase', color: 'var(--lavender)', opacity: 0.5, marginBottom: '8px' } }, 'Stars'),
                    e('p', { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: '2rem', fontWeight: 300, color: 'var(--rose-gold)', lineHeight: 1 } }, CONSTELLATIONS[currentKey].points.length)
                  ),
                  e('div', { style: { padding: '18px', borderRadius: '16px', background: 'rgba(180,160,220,0.05)', border: '1px solid rgba(180,160,220,0.1)' } },
                    e('p', { style: { fontSize: '8px', letterSpacing: '0.25em', textTransform: 'uppercase', color: 'var(--lavender)', opacity: 0.5, marginBottom: '8px' } }, 'Connections'),
                    e('p', { style: { fontFamily: "'Cormorant Garamond', serif", fontSize: '2rem', fontWeight: 300, color: 'var(--gold)', lineHeight: 1 } }, CONSTELLATIONS[currentKey].links.length)
                  )
                ),
                // Close button
                e('button', {
                  onClick: () => setShowInfo(false),
                  style: {
                    width: '100%', padding: '14px', borderRadius: '16px', cursor: 'pointer',
                    background: 'rgba(232,180,160,0.06)', border: '1px solid rgba(232,180,160,0.2)',
                    color: 'var(--rose-gold)', fontSize: '9px', letterSpacing: '0.3em', textTransform: 'uppercase',
                    fontFamily: "'Josefin Sans', sans-serif", fontWeight: 200, transition: 'all 0.3s'
                  }
                }, 'Close the Observatory')
              )
            ),

            e('audio', { ref: audioRef, loop: true, onEnded: () => setIsAudioPlaying(false) })
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
